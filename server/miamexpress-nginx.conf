# ============================================================
# Miamexpress — Livraison Premium au Cameroun
# ============================================================

server {
    listen 80;
    server_name miamexpress.cm vps-0943c5fc.vps.ovh.ca;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name miamexpress.cm vps-0943c5fc.vps.ovh.ca;

    root /home/ubuntu/miamexpress/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/miamexpress.cm/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miamexpress.cm/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;
    gzip_min_length 1024;

    # API proxy (miamexpress-api)
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # API media (mediatheque)
    location /api/media {
        proxy_pass http://127.0.0.1:3003/api/media;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M;
    }

    # Uploads statiques
    location /uploads/ {
        alias /home/ubuntu/miamexpress/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Assets avec hash - 404 si absent (PAS de fallback HTML !)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker - NO CACHE
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Workbox
    location ~ ^/workbox- {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Images statiques - 404 si absent
    location ~* \.(jpg|jpeg|png|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA fallback - UNIQUEMENT pour les routes, pas pour les fichiers
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
