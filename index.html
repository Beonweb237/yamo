<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/logo-icon.png" />
    <meta name="theme-color" content="#157F3D" />
    <title>MiamExpress — La Plateforme de Livraison N°1 au Cameroun</title>
    <meta name="description" content="MiamExpress — Savourez les meilleurs plats du Cameroun, livrés chez vous. Plus de 500 restaurants à Douala et Yaoundé. Paiement à la livraison, Mobile Money (MTN MoMo, Orange Money)." />
    <meta name="keywords" content="livraison repas Cameroun, restaurant Douala, restaurant Yaoundé, food delivery Cameroon, MiamExpress, commander en ligne, Mobile Money" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://miamexpress.cm/" />

    <!-- Open Graph / réseaux sociaux -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MiamExpress" />
    <meta property="og:locale" content="fr_CM" />
    <meta property="og:locale:alternate" content="en_CM" />
    <meta property="og:title" content="MiamExpress — La Plateforme de Livraison N°1 au Cameroun" />
    <meta property="og:description" content="Savourez les meilleurs plats du Cameroun, livrés chez vous. Plus de 500 restaurants à Douala et Yaoundé." />
    <meta property="og:url" content="https://miamexpress.cm/" />
    <meta property="og:image" content="https://miamexpress.cm/app-preview.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MiamExpress — Livraison de repas au Cameroun" />
    <meta name="twitter:description" content="Les meilleurs restaurants de Douala et Yaoundé, livrés chez vous." />
    <meta name="twitter:image" content="https://miamexpress.cm/app-preview.png" />

    <!-- Données structurées (SEO local) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MiamExpress",
      "url": "https://miamexpress.cm/",
      "logo": "https://miamexpress.cm/logo-icon.png",
      "description": "Plateforme de livraison de repas au Cameroun — Douala et Yaoundé.",
      "areaServed": [
        { "@type": "City", "name": "Douala" },
        { "@type": "City", "name": "Yaoundé" }
      ],
      "address": { "@type": "PostalAddress", "addressCountry": "CM", "addressLocality": "Douala" },
      "contactPoint": { "@type": "ContactPoint", "email": "support@miamexpress.cm", "contactType": "customer support", "availableLanguage": ["French", "English"] }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Sans+3:wght@500;600;700&display=swap" rel="stylesheet" />
